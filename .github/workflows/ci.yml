name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: posl_equipment_manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: posl_equipment_manager/package.json
          cache: npm
          cache-dependency-path: posl_equipment_manager/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: true
    defaults:
      run:
        working-directory: posl_equipment_manager
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: posl_equipment_manager/package.json
          cache: npm
          cache-dependency-path: posl_equipment_manager/package-lock.json
      - run: npm ci
      - run: npm run build
